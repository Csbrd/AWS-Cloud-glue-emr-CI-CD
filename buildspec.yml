version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install awscli --upgrade --quiet

  build:
    commands:
      # ── Glue: 스크립트 S3 업로드 + Job 업데이트 (7개 계열사) ──────────────────
      - aws s3 sync scripts/glue/ s3://lifesync-scripts/glue/ --delete
      - |
        for SUBSIDIARY in bank card securities insurance online_insurance healthcare hospital; do
          aws glue update-job \
            --job-name lifesync-${SUBSIDIARY}-etl \
            --job-update "{\"Command\":{\"Name\":\"glueetl\",\"ScriptLocation\":\"s3://lifesync-scripts/glue/subsidiary_etl.py\",\"PythonVersion\":\"3\"},\"DefaultArguments\":{\"--source\":\"${SUBSIDIARY}\",\"--job-bookmark-option\":\"job-bookmark-enable\",\"--enable-metrics\":\"true\"}}"
          echo "Updated Glue Job: lifesync-${SUBSIDIARY}-etl"
        done

      # ── EMR Serverless: 스크립트 S3 업로드 ────────────────────────────────────
      - aws s3 sync scripts/emr/ s3://lifesync-scripts/emr/ --delete
      - echo "EMR scripts synced to s3://lifesync-scripts/emr/"

      # ── Lambda: 3개 함수 배포 ─────────────────────────────────────────────────
      - zip -j /tmp/batch_loader.zip scripts/lambda/batch_loader.py
      - aws lambda update-function-code --function-name lifesync-batch-loader --zip-file fileb:///tmp/batch_loader.zip
      - zip -j /tmp/wearable_stream.zip scripts/lambda/wearable_stream.py
      - aws lambda update-function-code --function-name lifesync-wearable-stream-lambda --zip-file fileb:///tmp/wearable_stream.zip
      - mkdir -p /tmp/rec_pkg && cp scripts/lambda/recommendation_engine.py /tmp/rec_pkg/
      - cp -r scripts/lambda/build/psycopg2 scripts/lambda/build/psycopg2_binary.libs scripts/lambda/build/redis /tmp/rec_pkg/
      - cd /tmp/rec_pkg && zip -r /tmp/recommendation_engine.zip .
      - aws lambda update-function-code --function-name lifesync-recommendation-engine --zip-file fileb:///tmp/recommendation_engine.zip

  post_build:
    commands:
      - echo "Glue/EMR data pipeline deployment complete"

artifacts:
  files:
    - "**/*"
